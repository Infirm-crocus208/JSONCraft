<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSONCraft</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">

<header class="header">
  <div class="brand">JSONCraft</div>
  <div class="tools">
    <button id="sample">Sample</button>
    <button id="format">Format</button>
    <button id="clear">Clear</button>
    <button id="live-toggle" class="toggle-btn" title="Live conversion mode">Live</button>
    <button id="theme">Theme</button>
  </div>
</header>

<div class="grid">

  <div class="box">
    <div class="boxhead">
      JSON Input
      <div class="input-actions">
        <button id="url-import-btn" class="small-btn" title="Import from URL">↓ URL</button>
      </div>
    </div>

    <!-- URL import bar -->
    <div class="url-bar" id="url-bar" style="display:none">
      <input type="text" id="url-input" placeholder="https://api.example.com/data" />
      <button id="url-fetch">Fetch</button>
      <button id="url-cancel">✕</button>
    </div>

    <!-- Drop zone overlay -->
    <div class="drop-overlay" id="drop-overlay">
      <div class="drop-msg">Drop JSON file here</div>
    </div>

    <textarea id="json" placeholder="Paste JSON here, drop a file, or fetch from a URL..."></textarea>
    <div class="status" id="status"></div>
  </div>

  <div class="box">
    <div class="boxhead">Output</div>

    <div class="tabs" id="tabs">
      <button data-tab="ts" class="active">TypeScript</button>
      <button data-tab="python">Python</button>
      <button data-tab="graphql">GraphQL</button>
      <button data-tab="sql">SQL</button>
      <button data-tab="go">Go</button>
      <button data-tab="rust">Rust</button>
      <button data-tab="java">Java</button>
      <button data-tab="kotlin">Kotlin</button>
      <button data-tab="zod">Zod</button>
      <button data-tab="prisma">Prisma</button>
    </div>

    <pre id="output"></pre>

    <div class="actions">
      <button id="convert">Convert</button>
      <button id="copy">Copy</button>
      <button id="download">Download</button>
    </div>
  </div>

</div>

<footer class="foot">JSONCraft</footer>

</div>

<!-- URL import modal notice -->
<div class="toast" id="toast"></div>

<script src="script.js"></script>
</body>
</html>
